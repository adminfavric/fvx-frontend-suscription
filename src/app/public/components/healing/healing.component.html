<section class="healing">
  <div class="healing-container">
    <div class="healing-header healing-animate">
      <h2 class="healing-title">
        <em>Vive la experiencia con un ejercicio de<br>Sanación de Lita Donoso</em>
      </h2>
    </div>

    <div class="healing-video healing-animate animate-delay-1">
      <div class="video-card" (click)="openHealing()">
        <div class="video-poster">
          <img src="https://images.pexels.com/photos/3822688/pexels-photo-3822688.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="Ejercicio de sanación" />
          <div class="video-play-btn">
            <div class="play-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
              </svg>
            </div>
          </div>
        </div>
        <div class="video-info">
          <div class="video-tag">
            <span class="tag-dot"></span>
            Ejercicio de sanación
          </div>
          <div class="video-author">Lita Donoso Ocampo</div>
          <div class="video-social">
            <span class="social-handle">&#64;lita_donoso</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
