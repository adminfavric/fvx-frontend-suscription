<section id="hero" class="hero">
  <div class="video-background">
    <!-- Fallback image mientras carga el video -->
    <div class="fallback-bg" [class.hidden]="videoReady">
      <img src="assets/bg-site.png" alt="Background" />
    </div>
    
    <video
      #videoPlayer
      autoplay
      muted
      playsinline
      preload="auto">
    </video>
    <div class="video-overlay"></div>
  </div>

  <div class="hero-content" [class.loaded]="isLoaded">
    <div class="hero-text">
      <h1 class="hero-title">
        <span class="title-accent">Experiencias</span>
        <span class="title-main">Lita Donoso</span>
      </h1>
      <p class="hero-subtitle">
        Tu portal de transformación, autoconocimiento y expansión de consciencia
      </p>

    </div>
  </div>

  <div class="scroll-indicator">
    <div class="scroll-mouse">
      <div class="scroll-wheel"></div>
    </div>
    <span>Desplaza</span>
  </div>
</section>
