<div class="popup-container">
  <button class="close-btn" (click)="close()" aria-label="Cerrar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>

  <div class="popup-header" *ngIf="data.title">
    <h2>{{ data.title }}</h2>
  </div>

  <div class="popup-body">
    <div *ngIf="data.type === 'video' && data.videoUrl" class="video-wrapper">
      <iframe
        [src]="data.videoUrl"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>

    <div *ngIf="data.type === 'image' && data.imageUrl" class="image-wrapper">
      <img [src]="data.imageUrl" [alt]="data.title" />
    </div>

    <div *ngIf="data.type === 'form'" class="form-wrapper">
      <p *ngIf="!submitSuccess">{{ data.content }}</p>
      
      <div *ngIf="submitSuccess" class="success-message">
        <p>✓ ¡Mensaje enviado! Te contactaremos pronto.</p>
      </div>
      
      <form class="popup-form" *ngIf="!submitSuccess">
        <input type="text" [(ngModel)]="name" name="name" placeholder="Nombre" class="form-input" required />
        <input type="email" [(ngModel)]="email" name="email" placeholder="Email" class="form-input" required />
        <input type="text" [(ngModel)]="subject" name="subject" placeholder="Asunto" class="form-input" />
        <textarea [(ngModel)]="message" name="message" placeholder="Mensaje" class="form-input form-textarea" rows="4" required></textarea>
        <button type="button" class="submit-btn" (click)="submitContact()" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Enviando...' : 'Enviar' }}
        </button>
      </form>
    </div>

    <div *ngIf="!data.type || data.type === 'info'" class="text-wrapper">
      <p>{{ data.content }}</p>
    </div>
  </div>
</div>
